name: Build & Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Docker image version (example: v1.0.0)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Log in to Docker Hub
      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3️⃣ Build Docker image using your Dockerfile
      - name: Build Docker Image
        run: |
          docker build \
            -f Dockerfile-web \
            -t ${{ secrets.DOCKERHUB_USER }}/portfolio-web:${{ github.event.inputs.version }} \
            .

      # 4️⃣ Push Docker image with version tag
      - name: Push Version Tag
        run: |
          docker push ${{ secrets.DOCKERHUB_USER }}/portfolio-web:${{ github.event.inputs.version }}
