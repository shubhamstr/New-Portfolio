name: Build & Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Docker image version (example: v1.0.0)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Log in to Docker Hub
      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3️⃣ Build Docker image using your Dockerfile
      - name: Build Docker Image
        run: |
          docker build \
            -f Dockerfile-web \
            -t ${{ secrets.DOCKERHUB_USER }}/portfolio-web:${{ github.event.inputs.version }} \
            .

      # 4️⃣ Push Docker image with version tag
      - name: Push Version Tag
        run: |
          docker push ${{ secrets.DOCKERHUB_USER }}/portfolio-web:${{ github.event.inputs.version }}

      # 5️⃣ Deploy to EC2
      - name: Deploy to EC2 (Pull + Restart Container)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            CONTAINER_NAME="portfolio-web"
            IMAGE="${{ secrets.DOCKERHUB_USER }}/portfolio-web:${{ github.event.inputs.version }}"

            echo "Logging in to Docker..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USER }}" --password-stdin

            echo "Pulling new Docker image..."
            sudo docker pull $IMAGE

            echo "Stopping existing container if running..."
            if sudo docker ps -q --filter "name=$CONTAINER_NAME"; then
              sudo docker stop $CONTAINER_NAME
            fi

            echo "Removing existing container if exists..."
            if sudo docker ps -a -q --filter "name=$CONTAINER_NAME"; then
              sudo docker rm $CONTAINER_NAME
            fi

            echo "Starting new container..."
            sudo docker run -d \
              --name $CONTAINER_NAME \
              -p 3000:80 \
              --restart always \
              $IMAGE

            echo "Deployment completed successfully!"
