name: Build & Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Docker image version (example: v1.0.0)"
        required: true
        type: string
      type:
        description: "Select project type (web/api)"
        required: true
        type: choice
        options:
          - web
          - api

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Docker Hub Login
      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Determine Dockerfile + image name
      - name: Set variables
        id: vars
        run: |
          if [ "${{ github.event.inputs.type }}" = "web" ]; then
            echo "DOCKERFILE=Dockerfile.web" >> $GITHUB_OUTPUT
            echo "IMAGE_NAME=portfolio-web" >> $GITHUB_OUTPUT
          else
            echo "DOCKERFILE=Dockerfile.api" >> $GITHUB_OUTPUT
            echo "IMAGE_NAME=portfolio-api" >> $GITHUB_OUTPUT
          fi

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build \
            -f ${{ steps.vars.outputs.DOCKERFILE }} \
            -t ${{ secrets.DOCKERHUB_USER }}/${{ steps.vars.outputs.IMAGE_NAME }}:${{ github.event.inputs.version }} \
            .

      # Push Docker Image
      - name: Push Version Tag
        run: |
          docker push ${{ secrets.DOCKERHUB_USER }}/${{ steps.vars.outputs.IMAGE_NAME }}:${{ github.event.inputs.version }}

      # Deploy to EC2
      - name: Deploy to EC2 (Pull + Restart Container)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            TYPE="${{ github.event.inputs.type }}"
            VERSION="${{ github.event.inputs.version }}"

            if [ "$TYPE" = "web" ]; then
              CONTAINER_NAME="portfolio-web"
              IMAGE="${{ secrets.DOCKERHUB_USER }}/portfolio-web:$VERSION"
              PORT="-p 3000:80"
            else
              CONTAINER_NAME="portfolio-api"
              IMAGE="${{ secrets.DOCKERHUB_USER }}/portfolio-api:$VERSION"
              PORT="-p 5000:5000"
            fi

            echo "Logging in to Docker..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USER }}" --password-stdin

            echo "Pulling new Docker image..."
            sudo docker pull $IMAGE

            echo "Stopping existing container..."
            if sudo docker ps -q --filter "name=$CONTAINER_NAME"; then
              sudo docker stop $CONTAINER_NAME
            fi

            echo "Removing old container..."
            if sudo docker ps -a -q --filter "name=$CONTAINER_NAME"; then
              sudo docker rm $CONTAINER_NAME
            fi

            echo "Starting new container..."
            sudo docker run -d \
              --name $CONTAINER_NAME \
              $PORT \
              --restart always \
              $IMAGE

            echo "Deployment completed successfully!"
