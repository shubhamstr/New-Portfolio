<VirtualHost *:443>
    ServerAdmin codeguest.in
    ServerName codeguest.in
    ServerAlias www.codeguest.in

    # ---------------------------
    #     API Proxy (5000)
    # ---------------------------
    ProxyPass /api/ http://13.233.42.67:5000/
    ProxyPassReverse /api/ http://13.233.42.67:5000/

    # ---------------------------
    #     APP Proxy (443 → 3000)
    # ---------------------------
    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/
    # ---------------------------

    <Proxy *>
        Require all granted
    </Proxy>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # ---------------------------
    #         SSL CONFIG
    # ---------------------------
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/codeguest.in/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/codeguest.in/privkey.pem

    <FilesMatch "\.(?:cgi|shtml|phtml|php)$">
        SSLOptions +StdEnvVars
    </FilesMatch>

    <Directory /usr/lib/cgi-bin>
        SSLOptions +StdEnvVars
    </Directory>
</VirtualHost>
